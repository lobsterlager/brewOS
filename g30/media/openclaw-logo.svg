<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#263A52" opacity="0.08"/>

  <!-- Body -->
  <ellipse cx="100" cy="145" rx="35" ry="42" fill="#CF4B3A"/>
  <!-- Body segment lines -->
  <path d="M70 140 Q100 136 130 140" fill="none" stroke="#B53D2F" stroke-width="1.5" opacity="0.5"/>
  <path d="M68 155 Q100 151 132 155" fill="none" stroke="#B53D2F" stroke-width="1.5" opacity="0.5"/>
  <path d="M72 170 Q100 166 128 170" fill="none" stroke="#B53D2F" stroke-width="1.5" opacity="0.5"/>

  <!-- Tail fan -->
  <path d="M80 185 L68 198 L84 192 Z" fill="#D96858"/>
  <path d="M100 188 L100 200 L108 195 Z" fill="#D96858"/>
  <path d="M120 185 L132 198 L116 192 Z" fill="#D96858"/>

  <!-- Head -->
  <ellipse cx="100" cy="88" rx="42" ry="40" fill="#CF4B3A"/>

  <!-- Head highlight -->
  <ellipse cx="96" cy="65" rx="22" ry="12" fill="#D96858" opacity="0.4"/>

  <!-- Antennae -->
  <path d="M80 55 Q65 25 48 14" fill="none" stroke="#CF4B3A" stroke-width="3" stroke-linecap="round"/>
  <path d="M120 55 Q135 25 152 14" fill="none" stroke="#CF4B3A" stroke-width="3" stroke-linecap="round"/>
  <!-- Antennae tips -->
  <circle cx="48" cy="14" r="4" fill="#D96858"/>
  <circle cx="152" cy="14" r="4" fill="#D96858"/>

  <!-- Short antennules -->
  <path d="M84 58 Q76 42 70 36" fill="none" stroke="#CF4B3A" stroke-width="2" stroke-linecap="round"/>
  <path d="M116 58 Q124 42 130 36" fill="none" stroke="#CF4B3A" stroke-width="2" stroke-linecap="round"/>

  <!-- Claws (arms) -->
  <!-- Left claw arm -->
  <path d="M58 120 Q32 108 22 92" fill="none" stroke="#CF4B3A" stroke-width="6" stroke-linecap="round"/>
  <!-- Left claw pincer -->
  <path d="M22 92 Q14 78 20 72" fill="none" stroke="#CF4B3A" stroke-width="5" stroke-linecap="round"/>
  <path d="M22 92 Q30 80 26 72" fill="none" stroke="#CF4B3A" stroke-width="5" stroke-linecap="round"/>

  <!-- Right claw arm -->
  <path d="M142 120 Q168 108 178 92" fill="none" stroke="#CF4B3A" stroke-width="6" stroke-linecap="round"/>
  <!-- Right claw pincer -->
  <path d="M178 92 Q186 78 180 72" fill="none" stroke="#CF4B3A" stroke-width="5" stroke-linecap="round"/>
  <path d="M178 92 Q170 80 174 72" fill="none" stroke="#CF4B3A" stroke-width="5" stroke-linecap="round"/>

  <!-- Sunglasses -->
  <!-- Bridge -->
  <path d="M84 84 Q100 88 116 84" fill="none" stroke="#1B2A3E" stroke-width="3" stroke-linecap="round"/>
  <!-- Left lens -->
  <rect x="60" y="74" width="26" height="20" rx="6" fill="#1B2A3E" opacity="0.9"/>
  <rect x="60" y="74" width="26" height="20" rx="6" fill="none" stroke="#1B2A3E" stroke-width="2.5"/>
  <!-- Right lens -->
  <rect x="114" y="74" width="26" height="20" rx="6" fill="#1B2A3E" opacity="0.9"/>
  <rect x="114" y="74" width="26" height="20" rx="6" fill="none" stroke="#1B2A3E" stroke-width="2.5"/>
  <!-- Lens shine -->
  <rect x="64" y="77" width="7" height="4" rx="2" fill="white" opacity="0.3"/>
  <rect x="118" y="77" width="7" height="4" rx="2" fill="white" opacity="0.3"/>

  <!-- Smile -->
  <path d="M82 106 Q100 118 118 106" fill="none" stroke="#1B2A3E" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Cheeks -->
  <circle cx="74" cy="102" r="6" fill="#E87068" opacity="0.3"/>
  <circle cx="126" cy="102" r="6" fill="#E87068" opacity="0.3"/>

  <!-- Legs (small, sticking out from body) -->
  <line x1="70" y1="148" x2="54" y2="156" stroke="#B53D2F" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="72" y1="162" x2="56" y2="168" stroke="#B53D2F" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="130" y1="148" x2="146" y2="156" stroke="#B53D2F" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="128" y1="162" x2="144" y2="168" stroke="#B53D2F" stroke-width="2.5" stroke-linecap="round"/>
</svg>
